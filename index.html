<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>债券数据上传</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    body { font-family: Arial,sans-serif; padding: 30px; }
    .upload-box {
      max-width: 700px;
      margin: 0 auto;
      padding: 25px;
      border: 1px dashed #999;
      border-radius: 10px;
      text-align: center;
    }
    #status { margin-top: 20px; text-align:left; line-height:1.6; }
  </style>
</head>
<body>

<div class="upload-box">
  <h2>📊 债券数据上传</h2>
  <p>选择任意Excel文件，可多选，直接上传保存</p>
  <input type="file" id="fileSelect" accept=".xlsx,.xls" multiple style="margin:15px 0;">
  <br>
  <button onclick="uploadFiles()" style="padding:10px 25px; background:#007bff; color:white; border:none; border-radius:5px; cursor:pointer;">开始上传</button>
  <div id="status"></div>
</div>

<script>
// =======================
// 你的 Supabase 信息（已填好）
// =======================
const SUPABASE_URL = "https://wdcheezvqovvxnbqlryq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzINiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkY2hlZXp2cW92dnhuYnFscnlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTQyODksImV4cCI6MjA4OTU5MDI4OX0.5pEpNZ6T8v_62GYM-Ih9sjzooZxtYW5eTVGaN455EOo";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// =======================
// 上传函数（无任何限制）
// =======================
async function uploadFiles() {
  const files = document.getElementById("fileSelect").files;
  const status = document.getElementById("status");

  if (files.length === 0) {
    status.innerHTML = "❌ 请先选择文件";
    return;
  }

  status.innerHTML = "⏳ 开始上传...<br><br>";
  let success = 0;
  let fail = 0;

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    try {
      status.innerHTML += `⏳ 正在上传：${file.name}<br>`;

      // 转 base64
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = reject;
      });

      // 自动识别类型
      let type = "未知";
      const name = file.name;
      if (name.includes("上交所")) type = "上交所";
      else if (name.includes("上清所")) type = "上清所";
      else if (name.includes("深交所")) type = "深交所";
      else if (name.includes("中债登")) type = "中债登";

      // 上传到 supabase
      const { error } = await supabaseClient
        .from("bond_monthly_data")
        .insert([{
          file_name: file.name,
          file_type: type,
          file_content: base64
        }]);

      if (error) throw error;

      status.innerHTML += `✅ 上传成功：${file.name}（${type}）<br><br>`;
      success++;
    } catch (e) {
      status.innerHTML += `❌ 上传失败：${file.name} → ${e.message}<br><br>`;
      fail++;
    }
  }

  status.innerHTML += `📊 上传完成 → 成功：${success} 个，失败：${fail} 个`;
  document.getElementById("fileSelect").value = "";
}
</script>

</body>
</html>
